<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#e74c3c">
  <meta name="description" content="Chinese flashcard app with dictionary lookup, study cards, and quizzes">
  <title>Chinese Flashcards</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23e74c3c'/><text x='50' y='68' text-anchor='middle' font-size='50' fill='white'>&#23383;</text></svg>">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Header -->
  <header class="app-header">
    <h1>&#23383; Chinese Flashcards</h1>
    <span class="stats" id="header-stats">0 saved</span>
  </header>

  <!-- ===== Search Page ===== -->
  <div class="page" id="page-search">
    <div class="search-box">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" id="search-input" placeholder="Search English, Pinyin, or Chinese..."
             autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
    </div>
    <div class="search-hint">Search by English, Pinyin (with or without tones), or Chinese characters</div>
    <div class="search-results" id="search-results"></div>
  </div>

  <!-- ===== Study Page ===== -->
  <div class="page" id="page-study">
    <div id="study-content"></div>
  </div>

  <!-- ===== Quiz Page ===== -->
  <div class="page" id="page-quiz">
    <div id="quiz-content"></div>
  </div>

  <!-- ===== My Cards Page ===== -->
  <div class="page" id="page-mycards">
    <div id="mycards-content"></div>
    <div class="category-detail" id="category-detail"></div>
  </div>

  <!-- ===== Bottom Navigation ===== -->
  <nav class="bottom-nav">
    <button class="nav-item" data-page="search">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <span>Search</span>
    </button>
    <button class="nav-item" data-page="study">
      <svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
      <span>Study</span>
    </button>
    <button class="nav-item" data-page="quiz">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      <span>Quiz</span>
    </button>
    <button class="nav-item" data-page="mycards">
      <svg viewBox="0 0 24 24"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
      <span>My Cards</span>
    </button>
  </nav>

  <!-- ===== Add Modal ===== -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <h3>Save to Category</h3>
      <div class="modal-word-preview" id="modal-word-preview"></div>
      <div class="modal-categories" id="modal-categories"></div>
      <div class="custom-cat-input">
        <input type="text" id="new-cat-input" placeholder="New category name...">
        <button id="new-cat-btn">Add</button>
      </div>
      <div class="modal-actions">
        <button class="btn-modal-cancel" id="btn-modal-cancel">Cancel</button>
        <button class="btn-modal-save" id="btn-modal-save">Save Card</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <!-- Scripts -->
  <script src="js/dictionary.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
